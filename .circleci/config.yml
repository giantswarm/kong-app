version: 2.1
orbs:
  architect: giantswarm/architect@5.3.0

jobs:
  test:
    parameters:
      kindImage:
        type: string
    executor: "architect-orb/machine"
    steps:
      - architect/run-tests-with-ats:
          app-test-suite_container_tag: "v0.6.1"
          app-test-suite_version: "0.6.1"
          additional_app-test-suite_flags: "--app-tests-app-config-file=tests/test-values-enterprise.yaml --kind-cluster-image=<< parameters.kindImage >>"

workflows:
  version: 2
  build:
    jobs:
      - architect/push-to-app-catalog:
          name: "push-to-giantswarm-app-catalog"
          context: "architect"
          app_catalog: "giantswarm-catalog"
          app_catalog_test: "giantswarm-test-catalog"
          chart: "kong-app"
          executor: "app-build-suite"
          persist_chart_archive: true
          filters:
            # Trigger job on git tag.
            tags:
              only: /^v.*/

      # Require manual approval for running oss tests
      - hold-tests:
          name: hold OSS tests
          type: approval
          filters:
            branches:
              ignore:
                - main
            tags:
              ignore: /^v.*/

      - architect/run-tests-with-ats:
          name: execute oss chart tests (1.25)
          additional_app-test-suite_flags: "--kind-cluster-image=kindest/node:v1.25.16@sha256:5da57dfc290ac3599e775e63b8b6c49c0c85d3fec771cd7d55b45fae14b38d3b"
          filters:
            branches:
              ignore:
                - main
          requires:
            - hold OSS tests
            - push-to-giantswarm-app-catalog

      - test:
          name: execute enterprise tests
          filters:
            branches:
              ignore:
                - main
          requires:
            - push-to-giantswarm-app-catalog
          matrix:
            parameters:
              kindImage:
              - kindest/node:v1.25.16@sha256:5da57dfc290ac3599e775e63b8b6c49c0c85d3fec771cd7d55b45fae14b38d3b
              - kindest/node:v1.26.15@sha256:84333e26cae1d70361bb7339efb568df1871419f2019c80f9a12b7e2d485fe19
              - kindest/node:v1.27.13@sha256:17439fa5b32290e3ead39ead1250dca1d822d94a10d26f1981756cd51b24b9d8
              - kindest/node:v1.28.9@sha256:dca54bc6a6079dd34699d53d7d4ffa2e853e46a20cd12d619a09207e35300bd0
              - kindest/node:v1.29.4@sha256:3abb816a5b1061fb15c6e9e60856ec40d56b7b52bcea5f5f1350bc6e2320b6f8
              - kindest/node:v1.30.0@sha256:047357ac0cfea04663786a612ba1eaba9702bef25227a794b52890dd8bcd692e


